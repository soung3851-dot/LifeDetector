<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDetector Suite</title>
    <link rel="stylesheet" href="./assets/css/globals.css">
    <script src="./assets/js/theme.js"></script>
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* Navbar Styles */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 100;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        [data-theme="light"] header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text-color);
        }

        .nav-logo .highlight {
            color: var(--primary-neon);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-neon);
        }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 10%;
            z-index: 1;
        }

        /* Top Bar for Theme Toggle */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: flex-end;
            z-index: 10;
        }

        /* Floating Hero Content (No background box) */
        .hero-content {
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 1000px;
            z-index: 1;
        }

        [data-theme="light"] .hero-content {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        /* Ensure text is visible without background */
        h1,
        .subtitle,
        p,
        .nav-logo,
        .nav-links a {
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] h1 {
            text-shadow: 0 0 30px rgba(57, 255, 20, 0.3);
        }

        .logo-container {
            text-align: center;
            perspective: 1000px;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            letter-spacing: 6px;
            font-size: 3.8rem;
            margin: 0;
            filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.2));
        }



        h1 .highlight {
            color: var(--primary-neon);
        }

        .subtitle {
            color: var(--primary-neon);
            font-size: 0.9rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 5px;
            opacity: 0.8;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 10px 0;
        }

        p {
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .btn {
            background: rgba(57, 255, 20, 0.1);
            color: var(--text-color);
            border: 1px solid var(--primary-neon);
            padding: 18px 40px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 250px;
        }

        .btn.secondary {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
        }

        [data-theme="light"] .btn.secondary {
            border-color: rgba(0, 0, 0, 0.1);
        }



        .btn:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            transform: translateY(-5px);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-family: monospace;
            font-size: 0.8rem;
            margin: 20px 0;
            outline: none;
        }

        .modal-btn-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn:active {
            transform: translateY(1px) scale(0.98);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="#" class="nav-logo">Life<span class="highlight">Detector</span></a>
        <nav class="nav-links">
        </nav>
        <div class="nav-actions">
            <button class="theme-toggle-btn" aria-label="Toggle Theme">
                <!-- Icon injected by JS -->
            </button>
            <a href="./dashboard/index.html" class="btn"
                style="min-width: auto; padding: 10px 25px; font-size: 0.8rem;">Launch Console</a>
        </div>
    </header>

    <canvas id="bg-canvas"></canvas>

    <main class="hero">
        <div class="hero-content">
            <div class="content">
                <h1 class="reveal"
                    style="--d: 0.2s; font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 0;">
                    Life<span
                        style="color: var(--primary-neon); text-shadow: 0 0 12px var(--primary-neon);">Detector</span>
                </h1>
                <div class="reveal"
                    style="--d: 0.3s; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 12px; color: var(--primary-neon); margin-top: -10px; opacity: 0.8;">
                    DeepAlive Security Engine
                </div>

                <div class="divider reveal" style="--d: 0.4s; margin: 40px 0;"></div>

                <p class="reveal"
                    style="--d: 0.5s; font-size: 0.75rem; color: var(--text-secondary); tracking: 0.4em; opacity: 0.6;">
                    THE NEXT GENERATION OF FORENSIC DEEPFAKE DEFENSE.
                </p>

                <div class="btn-container reveal"
                    style="--d: 0.6s; display: flex; flex-direction: column; align-items: center; gap: 25px; margin-top: 40px; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto;">
                    <div style="display: flex; gap: 20px; width: 100%; justify-content: center;">
                        <button id="forensicBtn" class="btn">Forensic Analysis</button>
                        <button id="liveTestBtn" class="btn secondary">Live Testing Env</button>
                    </div>

                    <!-- Integrated Link Box (Slides Down) -->
                    <div id="integratedLinkBox" class="reveal"
                        style="display: none; width: 100%; max-width: 500px; background: var(--card-bg); border: 1px solid var(--primary-neon); border-radius: 20px; padding: 25px; backdrop-filter: blur(20px); box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);">
                        <div style="display: flex; flex-direction: column; gap: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="mono"
                                    style="font-size: 0.7rem; color: var(--primary-neon); font-weight: 900; letter-spacing: 2px;">SESSION_INITIATOR</span>
                                <span id="linkBoxType" class="mono"
                                    style="font-size: 0.6rem; color: var(--text-secondary); opacity: 0.6;">TYPE:
                                    CREATION_MODE</span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                <input type="text" id="sharedUrl" class="modal-input"
                                    style="margin: 0; flex: 1; background: rgba(0,0,0,0.3);"
                                    value="https://lifedetector.app/session/882-991">
                                <button id="actionBtn" class="btn"
                                    style="min-width: auto; padding: 10px 25px; font-size: 0.7rem; background: var(--primary-neon); color: black;">COPY</button>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <button id="launchConsoleBtn" class="mono"
                                    style="background: none; border: none; color: var(--text-secondary); font-size: 0.6rem; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; text-decoration: underline;">Open
                                    My Console</button>
                                <span class="mono"
                                    style="font-size: 0.6rem; color: var(--primary-neon); opacity: 0.8;">ENCRYPTED_SSL</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Unified Forensic Link Box (for creation) -->
            <!-- Invitation logic for forensicBtn remains in integratedLinkBox -->

            <!-- UNIQUE: Live Testing Join Modal -->
            <div id="meetJoinModal" class="modal-overlay">
                <div class="modal-content"
                    style="max-width: 500px; padding: 50px; border-color: rgba(255,255,255,0.1); background: linear-gradient(135deg, rgba(20,20,30,0.9), rgba(10,10,15,0.95));">
                    <div style="margin-bottom: 30px;">
                        <div
                            style="width: 60px; height: 60px; background: var(--primary-neon); border-radius: 20px; margin: 0 auto 20px; display: flex; items-center justify-center; box-shadow: 0 0 30px rgba(0, 229, 255, 0.3);">
                            <svg style="width: 30px; height: 30px; color: black;" fill="currentColor"
                                viewBox="0 0 24 24">
                                <path
                                    d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z" />
                            </svg>
                        </div>
                        <h2
                            style="font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 5px;">
                            Secure_Meet</h2>
                        <p style="font-size: 0.65rem; color: var(--text-secondary); tracking: 0.2em; opacity: 0.5;">
                            IDENTITY_VERIFICATION_REQUIRED</p>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <label class="mono"
                                style="font-size: 0.6rem; color: var(--primary-neon); opacity: 0.8; letter-spacing: 2px;">PARTICIPANT_NAME</label>
                            <input type="text" id="participantName" class="modal-input"
                                placeholder="e.g. Investigator_01"
                                style="margin: 0; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1);">
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 5px;">
                            <label class="mono"
                                style="font-size: 0.6rem; color: var(--primary-neon); opacity: 0.8; letter-spacing: 2px;">MEETING_SESSION_ID</label>
                            <input type="text" id="meetingIdInput" class="modal-input" placeholder="XXX-XXXX-XXX"
                                style="margin: 0; background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1);">
                        </div>
                    </div>

                    <div class="modal-btn-group" style="margin-top: 30px;">
                        <button id="joinConfirmBtn" class="btn"
                            style="min-width: 100%; padding: 20px; border-radius: 15px;">Establish Connection</button>
                        <button onclick="document.getElementById('meetJoinModal').style.display='none'"
                            style="margin-top: 15px; background: none; border: none; color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; opacity: 0.4; hover:opacity: 1;">Cancel_Request</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .reveal {
            opacity: 1;
            transform: translateY(0);
        }
    </style>



    <script>
        // Plexus Network Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        // Colors from the image: Cyan and Red
        const COLORS = {
            primary: [0, 229, 255],   // Cyan
            accent: [255, 51, 51]     // Red
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        window.addEventListener('resize', resize);

        // Mouse interaction
        let mouse = { x: null, y: null, radius: 150, clicked: false };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('mousedown', () => {
            mouse.clicked = true;
            // Temporarily expand radius on click for a wave effect
            mouse.radius = 300;
        });

        window.addEventListener('mouseup', () => {
            mouse.clicked = false;
            mouse.radius = 150;
        });

        class PlexusParticle {
            constructor() {
                this.baseX = Math.random() * width;
                this.baseY = Math.random() * height;
                this.x = this.baseX;
                this.y = this.baseY;

                // For gentle dynamic swaying
                this.angle = Math.random() * Math.PI * 2;
                this.orbitRadius = Math.random() * 30 + 10;
                this.orbitSpeed = Math.random() * 0.01 + 0.005;

                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 2 + 1.5;

                // 15% chance to be red, 85% cyan
                this.isAccent = Math.random() > 0.85;
                this.color = this.isAccent ? COLORS.accent : COLORS.primary;
            }

            update() {
                // Dynamic base sway
                this.angle += this.orbitSpeed;
                let targetX = this.baseX + Math.cos(this.angle) * this.orbitRadius;
                let targetY = this.baseY + Math.sin(this.angle) * this.orbitRadius;

                // Mouse interaction - repel smoothly
                if (mouse.x != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        // Push harder if clicked
                        let pushStrength = mouse.clicked ? 150 : 50;

                        targetX -= (dx / distance) * force * pushStrength;
                        targetY -= (dy / distance) * force * pushStrength;
                    }
                }

                // Smoothly ease towards the target position (spring physics)
                this.vx += (targetX - this.x) * 0.02;
                this.vy += (targetY - this.y) * 0.02;

                // Apply friction
                this.vx *= 0.85;
                this.vy *= 0.85;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                ctx.fill();

                // Subtle glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                ctx.fill();
                ctx.shadowBlur = 0; // Reset
            }
        }

        function initParticles() {
            particles = [];
            // Calculate number of particles based on screen area to maintain density
            const numParticles = Math.floor((width * height) / 12000);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new PlexusParticle());
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            // Dark theme: deep teal gradient look. Light theme: white
            ctx.fillStyle = isDark ? '#040d16' : '#ffffff';
            ctx.fillRect(0, 0, width, height);

            // If dark mode, maybe add a radial gradient for depth
            if (isDark) {
                const grad = ctx.createRadialGradient(width / 2, height / 2, 0, width / 2, height / 2, width / 2);
                grad.addColorStop(0, 'rgba(0, 20, 30, 0.4)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
            }

            particles.forEach(p => p.update());

            // Connect particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 180) {
                        ctx.beginPath();
                        // Opacity based on distance
                        let opacity = 1 - (distance / 180);
                        // Make lines slightly dimmer than nodes
                        opacity *= 0.6;

                        // Use red line if either particle is red, else cyan
                        const isRed = particles[i].isAccent || particles[j].isAccent;
                        const c = isRed ? COLORS.accent : COLORS.primary;

                        ctx.strokeStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Draw nodes over lines
            particles.forEach(p => p.draw());
        }

        resize();
        animate();
        // Integrated Link Box Logic
        const forensicBtn = document.getElementById('forensicBtn');
        const liveTestBtn = document.getElementById('liveTestBtn');
        const linkBox = document.getElementById('integratedLinkBox');
        const sharedUrl = document.getElementById('sharedUrl');
        const actionBtn = document.getElementById('actionBtn');
        const linkBoxType = document.getElementById('linkBoxType');
        const launchConsoleBtn = document.getElementById('launchConsoleBtn');
        const meetJoinModal = document.getElementById('meetJoinModal');
        const joinConfirmBtn = document.getElementById('joinConfirmBtn');

        forensicBtn.addEventListener('click', () => {
            const baseUrl = window.location.href.split('index.html')[0];
            sharedUrl.value = baseUrl + 'dashboard/subject.html';
            sharedUrl.readOnly = true;
            actionBtn.textContent = 'COPY';
            linkBoxType.textContent = 'TYPE: CREATION_MODE';
            linkBox.style.display = 'block';
            setTimeout(() => linkBox.style.opacity = '1', 10);
            meetJoinModal.style.display = 'none'; // Ensure other modal is closed
        });

        liveTestBtn.addEventListener('click', () => {
            meetJoinModal.style.display = 'flex';
            linkBox.style.display = 'none'; // Ensure other box is closed
        });

        joinConfirmBtn.addEventListener('click', () => {
            joinConfirmBtn.textContent = 'CONNECTING...';
            setTimeout(() => {
                window.location.href = 'meet/index.html';
            }, 1000);
        });

        actionBtn.addEventListener('click', () => {
            sharedUrl.select();
            document.execCommand('copy');
            actionBtn.textContent = 'DONE';
            setTimeout(() => actionBtn.textContent = 'COPY', 2000);
        });

        launchConsoleBtn.addEventListener('click', () => {
            window.location.href = 'dashboard/index.html';
        });

        window.onclick = (event) => {
            if (event.target == meetJoinModal) {
                meetJoinModal.style.display = "none";
            }
        };
    </script>
</body>

</html>
